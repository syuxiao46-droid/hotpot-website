<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火锅店宣传网站 - 首页</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">火锅天堂</div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="menu.html">菜单</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="contact.html">联系我们</a></li>
                <li><a href="promotions.html">优惠活动</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <h1>品味麻辣，享受生活</h1>
                <p>最新鲜的食材，最地道的风味，尽在火锅天堂</p>
                <div class="hero-buttons">
                    <a href="menu.html" class="btn primary-btn">查看菜单</a>
                    <a href="contact.html" class="btn secondary-btn">立即预订</a>
                </div>
            </div>
        </section>

        <section id="recommended-dishes" class="section-padding">
            <h2>推荐菜品</h2>
            <div class="dish-grid">
                <div class="dish-item">
                    <img src="images/mala-hotpot.jpg" alt="麻辣锅底">
                    <h3>麻辣锅底</h3>
                    <p>¥ 68</p>
                </div>
                <div class="dish-item">
                    <img src="images/premium-beef.jpg" alt="精品肥牛">
                    <h3>精品肥牛</h3>
                    <p>¥ 88</p>
                </div>
                <div class="dish-item">
                    <img src="images/fresh-vegetables.jpg" alt="新鲜时蔬拼盘">
                    <h3>新鲜时蔬拼盘</h3>
                    <p>¥ 48</p>
                </div>
            </div>
        </section>

        <section id="store-highlights" class="section-padding bg-light">
            <h2>店铺亮点</h2>
            <div class="highlight-grid">
                <div class="highlight-item">
                    <h3>食材新鲜</h3>
                    <p>每日新鲜采购，从农场到餐桌，保证食材的天然与美味。</p>
                </div>
                <div class="highlight-item">
                    <h3>环境优雅</h3>
                    <p>中式古典与现代简约完美融合，为您打造舒适惬意的用餐体验。</p>
                </div>
                <div class="highlight-item">
                    <h3>性价比高</h3>
                    <p>优质服务，美味菜品，实惠价格，让您尽享火锅盛宴。</p>
                </div>
            </div>
        </section>

        <section id="quick-navigation" class="section-padding">
            <h2>快速导航</h2>
            <div class="navigation-buttons">
                <a href="contact.html#reservation" class="btn primary-btn">在线订位</a>
                <a href="menu.html" class="btn secondary-btn">浏览菜单</a>
                <a href="contact.html#address" class="btn primary-btn">查找地址</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 火锅天堂. 保留所有权利。</p>
    </footer>

    <script src="js/script.js"></script>
